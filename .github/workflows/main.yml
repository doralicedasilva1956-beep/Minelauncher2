name: Build and Release Minelauncher2

on:
  push:
    branches: [ "main" ]

# Permissões necessárias para o robô conseguir criar a página de Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: true

    - name: Instalar NDK e CMake (Para o C++)
      run: |
        sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

    - name: Criar arquivos do Gradle (Caso faltem)
      run: |
        gradle wrapper --gradle-version 8.2

    - name: Dar permissão de execução ao Gradle
      run: chmod +x ./gradlew

    - name: Compilar o Aplicativo (Modo Debug/Release de teste)
      run: ./gradlew assembleDebug

    - name: Criar a Tag da Release automaticamente
      id: criar_tag
      run: echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Criar a página de Release e postar o APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.criar_tag.outputs.tag_name }}
        name: Minelauncher2 Atualização #${{ github.run_number }}
        body: |
          🚀 Nova versão do Minelauncher2 gerada automaticamente!
          - Suporte para arquitetura 32-bits (`armeabi-v7a`)
          - Base em Kotlin, Java e C++ configurada.
          - Sistema pronto para rodar em Android 8.0 ou superior.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
