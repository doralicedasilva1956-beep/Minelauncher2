name: Build and Release Minelauncher2

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: true

    - name: Instalar NDK e CMake específicos
      run: |
        sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

    - name: Instalar Gradle Wrapper automaticamente
      run: |
        gradle wrapper --gradle-version 8.2

    - name: Dar permissão de execução ao Gradle
      run: chmod +x ./gradlew

    - name: Compilar o Aplicativo em Modo Debug
      run: ./gradlew assembleDebug

    - name: Criar Tag Automática para Release
      id: criar_tag
      run: echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Publicar Release Oficial com APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.criar_tag.outputs.tag_name }}
        name: Minelauncher2 v1.0.${{ github.run_number }}
        body: |
          🚀 Compilação automática do Minelauncher2 finalizada!
          - Suporte a celulares ARM de 32-bits (`armeabi-v7a`).
          - Código misto com Java, Kotlin e C++.
          - Compatível com Android 8.0 ou superior.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
